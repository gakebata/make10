<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<title>make10 — 四則演算パズルソルバー</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="make10">
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --line: #30363d;
    --fg: #e6edf3; --muted: #8b949e; --accent: #2f81f7; --ok: #3fb950;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; padding: env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 24px);
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Segoe UI", sans-serif;
    line-height: 1.5;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin: 20px 0 2px; }
  .sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 18px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px; }
  label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
  input[type="text"], input[type="number"] {
    width: 100%; padding: 12px; font-size: 1.1rem; color: var(--fg);
    background: #0d1117; border: 1px solid var(--line); border-radius: 8px;
    -webkit-appearance: none; appearance: none;
  }
  input:focus { outline: none; border-color: var(--accent); }
  .row { display: flex; gap: 12px; margin-top: 12px; }
  .row > div:first-child { flex: 2; }
  .row > div:last-child { flex: 1; }
  .check { display: flex; align-items: center; gap: 8px; margin-top: 14px; font-size: 0.9rem; color: var(--muted); }
  .check input { width: 18px; height: 18px; accent-color: var(--accent); }
  button {
    width: 100%; margin-top: 16px; padding: 14px; font-size: 1.1rem; font-weight: 600;
    color: #fff; background: var(--accent); border: none; border-radius: 8px; cursor: pointer;
  }
  button:active { opacity: 0.85; }
  .examples { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .examples button {
    width: auto; margin: 0; padding: 7px 12px; font-size: 0.85rem; font-weight: 500;
    color: var(--fg); background: #21262d; border: 1px solid var(--line);
  }
  .count { margin: 20px 0 8px; font-size: 0.9rem; color: var(--muted); }
  .count b { color: var(--ok); }
  ul { list-style: none; margin: 0; padding: 0; }
  li {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 1.05rem;
    padding: 11px 14px; border: 1px solid var(--line); border-radius: 8px;
    margin-bottom: 8px; background: var(--card); word-break: break-all;
  }
  .empty { color: var(--muted); padding: 8px 0; }
  .err { color: #f85149; }
  footer { margin-top: 28px; text-align: center; color: var(--muted); font-size: 0.75rem; }
  footer a { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <h1>make10</h1>
  <div class="sub">数字を四則演算 (+ − × ÷ と括弧) で組み合わせ、目標値になる式を列挙します。</div>

  <div class="card">
    <div class="row">
      <div>
        <label for="nums">数字</label>
        <input id="nums" type="text" inputmode="numeric" autocomplete="off"
               autocapitalize="off" spellcheck="false"
               placeholder="例: 1234 / 12 3 4">
      </div>
      <div>
        <label for="target">目標値</label>
        <input id="target" type="number" inputmode="numeric" value="10">
      </div>
    </div>

    <div class="examples" id="examples"></div>

    <label class="check">
      <input id="dedup" type="checkbox" checked>
      等価な式の重複を除く
    </label>

    <button id="solve">計算する</button>
  </div>

  <div class="count" id="count"></div>
  <ul id="results"></ul>

  <footer>
    区切り無し (<code>1234</code>) は 1 桁ずつ、空白/カンマ区切り (<code>12 3 4</code>) は複数桁として扱います。<br>
    厳密分数 (BigInt) で計算するため浮動小数点の取りこぼしはありません。
  </footer>
</div>

<script>
"use strict";

/* ---------- 厳密分数 (BigInt) ---------- */
function gcd(a, b) {
  a = a < 0n ? -a : a; b = b < 0n ? -b : b;
  while (b) { [a, b] = [b, a % b]; }
  return a || 1n;
}
class Frac {
  constructor(n, d = 1n) {
    if (d === 0n) throw new Error("zero division");
    if (d < 0n) { n = -n; d = -d; }
    const g = gcd(n, d);
    this.n = n / g; this.d = d / g;
  }
  add(o) { return new Frac(this.n * o.d + o.n * this.d, this.d * o.d); }
  sub(o) { return new Frac(this.n * o.d - o.n * this.d, this.d * o.d); }
  mul(o) { return new Frac(this.n * o.n, this.d * o.d); }
  div(o) { if (o.n === 0n) throw new Error("zero division"); return new Frac(this.n * o.d, this.d * o.n); }
  eq(o)  { return this.n === o.n && this.d === o.d; }
  toString() { return this.d === 1n ? this.n.toString() : this.n + "/" + this.d; }
}

/* ---------- 入力の解釈 ---------- */
function parseTokens(text) {
  text = text.trim();
  if (!text) return [];
  const parts = /[,\s]/.test(text) ? text.split(/[,\s]+/).filter(Boolean) : text.split("");
  return parts.map(p => {
    if (!/^-?\d+$/.test(p)) throw new Error("数字以外が含まれています: " + p);
    return { type: "num", value: new Frac(BigInt(p)), text: p };
  });
}

/* ---------- 評価 ---------- */
function evaluate(e) {
  if (e.type === "num") return e.value;
  const a = evaluate(e.left), b = evaluate(e.right);
  switch (e.op) {
    case "+": return a.add(b);
    case "-": return a.sub(b);
    case "*": return a.mul(b);
    case "/": return a.div(b);
  }
}

/* ---------- 文字列化 (括弧最小化) ---------- */
const PREC = { "+": 1, "-": 1, "*": 2, "/": 2 };
const GLYPH = { "+": "+", "-": "−", "*": "×", "/": "÷" };
function render(e) {
  if (e.type === "num") return e.text;
  const p = PREC[e.op];
  const l = renderChild(e.left, p, false, e.op);
  const r = renderChild(e.right, p, true, e.op);
  return l + " " + GLYPH[e.op] + " " + r;
}
function renderChild(c, parentPrec, isRight, parentOp) {
  const s = render(c);
  if (c.type === "num") return s;
  const cp = PREC[c.op];
  let need = cp < parentPrec;
  if (cp === parentPrec && isRight && (parentOp === "-" || parentOp === "/")) need = true;
  return need ? "(" + s + ")" : s;
}

/* ---------- 正規化 (重複除去) ---------- */
function flatten(e, op) {
  if (e.type === "op" && e.op === op) return [...flatten(e.left, op), ...flatten(e.right, op)];
  return [e];
}
function canon(e) {
  if (e.type === "num") return "n" + e.value.toString();
  if (e.op === "+" || e.op === "*") {
    const terms = flatten(e, e.op).map(canon).sort();
    return e.op + "[" + terms.join(",") + "]";
  }
  return e.op + "(" + canon(e.left) + "," + canon(e.right) + ")";
}

/* ---------- 式の生成 ---------- */
function* generate(exprs) {
  if (exprs.length === 1) { yield exprs[0]; return; }
  const n = exprs.length;
  for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
      if (i === j) continue;
      const rest = [];
      for (let k = 0; k < n; k++) if (k !== i && k !== j) rest.push(exprs[k]);
      for (const op of ["+", "-", "*", "/"]) {
        yield* generate([...rest, { type: "op", op, left: exprs[i], right: exprs[j] }]);
      }
    }
  }
}

/* ---------- 公開 API ---------- */
function solve(text, target, dedup) {
  const leaves = parseTokens(text);
  if (!leaves.length) return [];
  const tgt = new Frac(BigInt(target));
  const out = [], seenKey = new Set(), seenText = new Set();
  for (const e of generate(leaves)) {
    let v;
    try { v = evaluate(e); } catch (_) { continue; } // ゼロ除算はスキップ
    if (!v.eq(tgt)) continue;
    const t = render(e);
    if (dedup) {
      const k = canon(e);
      if (seenKey.has(k) || seenText.has(t)) continue;
      seenKey.add(k); seenText.add(t);
    }
    out.push(t);
  }
  return out;
}

/* ---------- UI ---------- */
const $ = id => document.getElementById(id);
const numsEl = $("nums"), targetEl = $("target"), dedupEl = $("dedup");
const countEl = $("count"), resultsEl = $("results");

function run() {
  const text = numsEl.value;
  const target = parseInt(targetEl.value, 10);
  countEl.innerHTML = ""; resultsEl.innerHTML = "";
  if (!text.trim()) return; // 未入力時は何も表示しない
  if (!Number.isFinite(target)) { countEl.innerHTML = '<span class="err">目標値を入力してください</span>'; return; }
  let results;
  try {
    results = solve(text, target, dedupEl.checked);
  } catch (err) {
    countEl.innerHTML = '<span class="err">' + err.message + "</span>";
    return;
  }
  if (!results.length) {
    countEl.innerHTML = "見つかりませんでした";
    resultsEl.innerHTML = '<li class="empty">該当する式はありません</li>';
    return;
  }
  countEl.innerHTML = "<b>" + results.length + "</b> 件の式";
  const frag = document.createDocumentFragment();
  for (const f of results) {
    const li = document.createElement("li");
    li.textContent = f + " = " + target;
    frag.appendChild(li);
  }
  resultsEl.appendChild(frag);
}

/* 例ボタン */
const EXAMPLES = [["1234", 10], ["3478", 24], ["12 3 4", 10], ["1111", 10]];
const exWrap = $("examples");
for (const [nums, tgt] of EXAMPLES) {
  const b = document.createElement("button");
  b.textContent = nums + " → " + tgt;
  b.addEventListener("click", () => { numsEl.value = nums; targetEl.value = tgt; run(); });
  exWrap.appendChild(b);
}

$("solve").addEventListener("click", run);
numsEl.addEventListener("keydown", e => { if (e.key === "Enter") run(); });
targetEl.addEventListener("keydown", e => { if (e.key === "Enter") run(); });
numsEl.focus(); // 初期表示は空。入力欄にフォーカス

/* PWA: Service Worker を登録してオフライン対応 */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
